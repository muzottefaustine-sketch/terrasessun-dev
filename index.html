// ══ GPS CACHE ══
(function() {
  const _orig = navigator.geolocation.getCurrentPosition.bind(navigator.geolocation);
  let _pos = null;
  navigator.geolocation.getCurrentPosition = function(ok, err, opt) {
    if (_pos) { ok(_pos); return; }
    _orig(p => { _pos = p; ok(p); }, err, { enableHighAccuracy: false, timeout: 6000, maximumAge: 300000 });
  };
})();

// ══ VILLES ══
const CITIES = [
  {id:'bordeaux',   nom:'Bordeaux',    lat:44.837789, lng:-0.57918 },
  {id:'paris',      nom:'Paris',       lat:48.856613, lng:2.352222 },
  {id:'marseille',  nom:'Marseille',   lat:43.296482, lng:5.381118 },
  {id:'lyon',       nom:'Lyon',        lat:45.764043, lng:4.835659 },
  {id:'toulouse',   nom:'Toulouse',    lat:43.604652, lng:1.444209 },
  {id:'nice',       nom:'Nice',        lat:43.710173, lng:7.262011 },
  {id:'cannes',     nom:'Cannes',      lat:43.552847, lng:7.017369 },
  {id:'nantes',     nom:'Nantes',      lat:47.218371, lng:-1.553621},
  {id:'strasbourg', nom:'Strasbourg',  lat:48.573405, lng:7.752111 },
  {id:'montpellier',nom:'Montpellier', lat:43.610769, lng:3.876716 },
  {id:'lille',      nom:'Lille',       lat:50.629250, lng:3.057256 },
];
let currentCity = CITIES[0];

const cityMenuEl = document.getElementById('cityMenu');
CITIES.forEach(city => {
  const item = document.createElement('div');
  item.className = 'city-item' + (city.id === 'bordeaux' ? ' active' : '');
  item.dataset.id = city.id;
  item.textContent = city.nom;
  item.addEventListener('click', () => {
    currentCity = city;
    document.getElementById('villeLabel').textContent = city.nom;
    document.querySelectorAll('.city-item').forEach(c => c.classList.toggle('active', c.dataset.id === city.id));
    cityMenuEl.classList.remove('open');
    Object.keys(markerEntities).forEach(k => { viewer.entities.remove(markerEntities[k]); delete markerEntities[k]; });
    terrasses = []; sunStates = {};
    viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(city.lng, city.lat, 500), orientation: { heading: 0, pitch: Cesium.Math.toRadians(-50), roll: 0 }, duration: 1.8 });
    loadTerrasses();
  });
  cityMenuEl.appendChild(item);
});

function toggleCityMenu() { cityMenuEl.classList.toggle('open'); }
document.addEventListener('click', e => { if (!e.target.closest('#btnVille') && !e.target.closest('#cityMenu')) cityMenuEl.classList.remove('open'); });

dhandle.addEventListener('touchstart', e => { ty0 = e.touches[0].clientY; }, { passive:true });

}
function completeSplash() {
  if (splashDone) return; splashDone = true; setProgress(100, 'Prêt !');
  setTimeout(() => { document.getElementById('splash').classList.add('out'); setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 650); }, 300);
}
setTimeout(completeSplash, 10000);

// ══ CESIUM ══
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIwM2M0Njk1Yi1iYzI1LTQ3MzAtOGU1MS1iNzU4MTRiNWVkY2QiLCJpZCI6Mzk5MDg5LCJpYXQiOjE3NzI3ODI3NTh9.aGJt8zcDKPwk-pJsAcp0egE1wgJ5Vg41y_yQKNfUtYw';

// ✅ On garde le terrain mondial comme référence de sol
const viewer = new Cesium.Viewer('cesiumContainer', {
  terrainProvider: Cesium.createWorldTerrain(),
  skyBox: false, skyAtmosphere: false,
  baseLayerPicker: false, homeButton: false, infoBox: false, selectionIndicator: false,
  navigationHelpButton: false, sceneModePicker: false, animation: false, timeline: false,
  fullscreenButton: false, geocoder: false, scene3DOnly: true,
});

viewer.scene.globe.maximumScreenSpaceError = 2;
viewer.scene.globe.tileCacheSize = 100;
viewer.scene.globe.preloadAncestors = false;
viewer.scene.globe.preloadSiblings = false;
viewer.scene.globe.enableLighting = true;
viewer.scene.fog.enabled = false;
viewer.shadows = true;
viewer.resolutionScale = window.devicePixelRatio || 1;
viewer.scene.globe.showWaterEffect = false;
viewer.scene.postProcessStages.fxaa.enabled = false;

viewer.scene.screenSpaceCameraController.inertiaZoom = 0.8;

// ✅ Globe visible = les tuiles Google s'ancrent correctement au sol

viewer.camera.setView({

// ══ GOOGLE PHOTOREALISTIC 3D TILES ══
// ✅ REMPLACE createOsmBuildings() — hauteurs réelles par photogrammétrie satellite
setProgress(10, 'Chargement…');
let googleTileset = null;
let buildingsOk = false;
let globeOk = true; // Plus de globe à attendre

async function initGoogleTiles() {
  try {
    googleTileset = await Cesium.createGooglePhotorealistic3DTileset(
      'AIzaSyC4nbhNNAGI6kQlCheAEN6jZkQM1xyZOVI'
    );
    viewer.scene.primitives.add(googleTileset);
    googleTileset.maximumScreenSpaceError = 8; // Équilibre qualité/perf
    setProgress(85, 'Finalisation…');
    buildingsOk = true;
    tryOpen();
  } catch(e) {
    console.warn('Google 3D Tiles erreur, fallback OSM…', e);
    // Fallback OSM si Google échoue
    const osm = viewer.scene.primitives.add(Cesium.createOsmBuildings());
    viewer.scene.globe.show = true;
    osm.readyPromise.then(() => { buildingsOk = true; tryOpen(); }).catch(() => { buildingsOk = true; tryOpen(); });
  }
}

function tryOpen() {
  if (!buildingsOk) return;
  let f = 0;
  viewer.scene.postRender.addEventListener(function waitRender() {
    if (++f >= 8) { viewer.scene.postRender.removeEventListener(waitRender); completeSplash(); }
  });
}

// Suivi progression chargement tuiles
viewer.scene.postRender.addEventListener(function watchProgress() {
  const stats = viewer.scene.stats;
  if (stats) {
    const pct = Math.min(80, 10 + (stats.commandsExecuted / Math.max(stats.commandsInFrustum, 1)) * 70);
    setProgress(pct);
  }
});

initGoogleTiles();

// ══ GÉOLOC ══
let userDot = null;
function makeUserDot() {
  const c = document.createElement('canvas'); c.width = 20; c.height = 20; const ctx = c.getContext('2d');
  ctx.beginPath(); ctx.arc(10,10,9,0,Math.PI*2); ctx.fillStyle='rgba(0,122,255,0.18)'; ctx.fill();
  ctx.beginPath(); ctx.arc(10,10,6,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
  ctx.beginPath(); ctx.arc(10,10,4,0,Math.PI*2); ctx.fillStyle='#007AFF'; ctx.fill();
  return c.toDataURL();
}
function placeUserDot(lng, lat) {
  if (userDot) viewer.entities.remove(userDot);
  userDot = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lng, lat, 3),
    billboard: { image:makeUserDot(), verticalOrigin:Cesium.VerticalOrigin.CENTER, heightReference:Cesium.HeightReference.RELATIVE_TO_GROUND, width:20, height:20, disableDepthTestDistance:Number.POSITIVE_INFINITY }
  });
}
function geolocate() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('btnGeo'); btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(pos => {
    btn.classList.remove('locating');
    const { longitude:lng, latitude:lat } = pos.coords;
    placeUserDot(lng, lat);
    viewer.camera.flyTo({ destination:Cesium.Cartesian3.fromDegrees(lng,lat,400), orientation:{heading:0,pitch:Cesium.Math.toRadians(-50),roll:0}, duration:1.8 });
  }, ()=>btn.classList.remove('locating'), { enableHighAccuracy:true, timeout:8000 });
}

// ══ STATE ══
let terrasses=[], sunStates={}, searchQuery='', currentHeure=14, currentDate=new Date();
const markerEntities={};

// ══ OVERPASS / DATA ══
function typeLabel(a){return{bar:'Bar',cafe:'Café',restaurant:'Restaurant',pub:'Pub',biergarten:'Brasserie'}[a]||'Terrasse';}
const OVERPASS=['https://overpass-api.de/api/interpreter','https://overpass.kumi.systems/api/interpreter'];

async function fetchTerrasses(){
  if(currentCity.id==='bordeaux'){
    const res=await fetch('/data/terrasses.json'); const data=await res.json(); const seen=new Set();
    return data.features.filter(f=>f.properties?.name&&!seen.has(f.properties.name)&&seen.add(f.properties.name))
      .map(f=>({id:f.properties.id||Math.random(),nom:f.properties.name,adresse:f.properties['addr:street']?((f.properties['addr:housenumber']||'')+' '+f.properties['addr:street']).trim():'',type:typeLabel(f.properties.amenity),lng:f.geometry.coordinates[0],lat:f.geometry.coordinates[1]}));
  }
  const bbox=`${currentCity.lat-0.04},${currentCity.lng-0.06},${currentCity.lat+0.04},${currentCity.lng+0.06}`;
  const q=`[out:json][timeout:25];(node["amenity"~"bar|cafe|restaurant|pub|biergarten"](${bbox}););out body;`;
  for(const url of OVERPASS){
    try{
      const r=await fetch(url,{method:'POST',body:'data='+encodeURIComponent(q)});
      if(!r.ok)throw new Error();
      const d=await r.json(); const seen=new Set();
      return(d.elements||[]).filter(el=>el.lat&&el.lon&&el.tags?.name&&!seen.has(el.tags.name)&&seen.add(el.tags.name))
        .map(el=>({id:el.id,nom:el.tags.name,adresse:el.tags['addr:street']?((el.tags['addr:housenumber']||'')+' '+el.tags['addr:street']).trim():'',type:typeLabel(el.tags.amenity),lng:el.lon,lat:el.lat}));
    }catch(e){}
  }
  return[];
}

// ══ RAY CASTING (identique, fonctionne mieux avec Google 3D Tiles) ══
function getSunDir(jd){
  const s=Cesium.Simon1994PlanetaryPositions.computeSunPositionInEarthInertialFrame(jd);
  const m=Cesium.Transforms.computeIcrfToFixedMatrix(jd); if(!m) return null;
  const d=new Cesium.Cartesian3(); Cesium.Matrix3.multiplyByVector(m,s,d); return Cesium.Cartesian3.normalize(d,d);
}
function checkSunny(t, sunDir){
  if(!sunDir) return false;
  const pos=Cesium.Cartesian3.fromDegrees(t.lng, t.lat, 1.0);
  const up=Cesium.Cartesian3.normalize(pos, new Cesium.Cartesian3());
  if(Cesium.Cartesian3.dot(sunDir, up) <= 0.0) return false;
  // ✅ pickFromRay intercepte maintenant les vrais meshes Google 3D
  const hit = viewer.scene.pickFromRay(new Cesium.Ray(pos, sunDir), Object.values(markerEntities));
  return !hit;
}

let cameraMoving=false;
viewer.camera.moveStart.addEventListener(()=>{ cameraMoving=true; });
viewer.camera.moveEnd.addEventListener(()=>{ cameraMoving=false; });

let shadowDebounce=null, computing=false, shadowVersion=0;
function scheduleShadow(){
  clearTimeout(shadowDebounce);
  shadowDebounce=setTimeout(()=>{
    if(cameraMoving) return;
    const waitTiles=()=>{
      // ✅ Attendre que les tuiles Google soient chargées avant le ray casting
      const ready = googleTileset
        ? !googleTileset._loader || googleTileset._loader._statsInFlight === 0
        : viewer.scene.globe.tilesLoaded;
      if(ready){ runShadow(); }
      else {
        const unsub=viewer.scene.postRender.addEventListener(()=>{
          const r2 = googleTileset
            ? !googleTileset._loader || googleTileset._loader._statsInFlight === 0
            : viewer.scene.globe.tilesLoaded;
          if(r2){ unsub(); runShadow(); }
        });
      }
    };
    waitTiles();
  }, 600);
}

async function runShadow(){
  if(computing) return; computing=true; const version=++shadowVersion;
  const jd=viewer.clock.currentTime; const sunDir=getSunDir(jd);
  for(let i=0; i<terrasses.length; i+=10){
    if(version!==shadowVersion || cameraMoving){ computing=false; return; }
    viewer.scene.render(jd);
    for(const t of terrasses.slice(i,i+10)) sunStates[t.id]=checkSunny(t, sunDir);
    syncDots(); renderList(currentHeure, searchQuery);
    await new Promise(r=>setTimeout(r,0));
  }
  computing=false;
}

// ══ DOTS ══
function makeSunIcon(sunny){
  const c=document.createElement('canvas'); c.width=20; c.height=20; const ctx=c.getContext('2d');
  if(sunny){
    ctx.strokeStyle='#FFD600'; ctx.lineWidth=1.5; ctx.lineCap='round';
    for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(10+Math.cos(a)*6.5,10+Math.sin(a)*6.5);ctx.lineTo(10+Math.cos(a)*9,10+Math.sin(a)*9);ctx.stroke();}
    ctx.beginPath();ctx.arc(10,10,4.5,0,Math.PI*2);ctx.fillStyle='#FFD600';ctx.fill();
    ctx.beginPath();ctx.arc(10,10,4.5,0,Math.PI*2);ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();
  }else{
    ctx.beginPath();ctx.arc(10,10,5,0,Math.PI*2);ctx.fillStyle='#8E9BAD';ctx.fill();
    ctx.beginPath();ctx.arc(10,10,5,0,Math.PI*2);ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();
  }
  return c.toDataURL();
}
const DOT_SUN=makeSunIcon(true), DOT_SHADE=makeSunIcon(false);

function syncDots(){
  terrasses.forEach(t=>{
    const s=sunStates[t.id]===true;
    if(!markerEntities[t.id]){
      markerEntities[t.id]=viewer.entities.add({
        position:Cesium.Cartesian3.fromDegrees(t.lng,t.lat,2),
        billboard:{image:s?DOT_SUN:DOT_SHADE,verticalOrigin:Cesium.VerticalOrigin.CENTER,heightReference:Cesium.HeightReference.RELATIVE_TO_GROUND,width:20,height:20,disableDepthTestDistance:Number.POSITIVE_INFINITY},
        properties:{id:t.id}
      });
    }else{
      markerEntities[t.id].billboard.image = s ? DOT_SUN : DOT_SHADE;
      markerEntities[t.id].show = true;
    }
  });
}

// ══ TOOLTIP ══
const tooltip=document.getElementById('tooltip'); let ttTimeout=null;
function showTooltip(t,x,y){
  document.getElementById('ttName').textContent=t.nom;
  document.getElementById('ttType').textContent=t.type+(t.adresse?' · '+t.adresse:'');
  const s=sunStates[t.id]===true;
  const el=document.getElementById('ttSun'); el.textContent=s?'☀ Au soleil':'🌥 À l\'ombre'; el.className='tt-sun '+(s?'sun':'shade');
  const w=260; tooltip.style.left=Math.min(Math.max(x-w/2,10),window.innerWidth-w-10)+'px'; tooltip.style.top=Math.max(y-130,10)+'px';
  tooltip.classList.add('visible'); if(navigator.vibrate) navigator.vibrate(10);
  const ml=document.getElementById('ttMaps'); if(ml) ml.href=`https://maps.apple.com/?q=${encodeURIComponent(t.nom+', '+currentCity.nom)}&ll=${t.lat},${t.lng}`;
  clearTimeout(ttTimeout); ttTimeout=setTimeout(()=>tooltip.classList.remove('visible'),6000);
}
function hideTooltip(){clearTimeout(ttTimeout);tooltip.classList.remove('visible');}

// ══ HELPERS ══
function normalize(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function highlight(text,q){if(!q)return text;return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:#FFFBE0;color:#9A7E00;border-radius:3px;padding:0 2px">$1</mark>');}

// ══ LISTE ══
function renderList(h,query){
  const list=document.getElementById('terrasseList');
  const q=normalize(query||'');
  let filtered=terrasses; if(q) filtered=terrasses.filter(t=>normalize(t.nom).includes(q)||normalize(t.type).includes(q)||normalize(t.adresse).includes(q));
  const sorted=[...filtered].sort((a,b)=>(sunStates[b.id]?1:0)-(sunStates[a.id]?1:0));
  list.innerHTML='';
  if(!sorted.length){list.innerHTML=`<div class="no-results">Aucun résultat${query?' pour <strong>"'+query+'"</strong>':''}</div>`;return;}
  sorted.forEach(t=>{
    const card=document.createElement('div'); card.className='card'; card.dataset.id=t.id;
    card.innerHTML=`<div class="card-icon sun">☀️</div><div class="card-body"><div class="card-name">${highlight(t.nom,query)}</div><div class="card-sub">${t.type}${t.adresse?' · '+t.adresse:''}</div></div>`;
    card.addEventListener('click',()=>{
      document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); card.classList.add('active'); closeDrawer();
      viewer.camera.flyToBoundingSphere(new Cesium.BoundingSphere(Cesium.Cartesian3.fromDegrees(t.lng,t.lat,0),120),{offset:new Cesium.HeadingPitchRange(0,Cesium.Math.toRadians(-65),220),duration:1.4});
    });
    list.appendChild(card);
  });
}

// ══ SEARCH ══
const searchInput=document.getElementById('searchInput'), searchClear=document.getElementById('searchClear');
searchInput.addEventListener('input',e=>{searchQuery=e.target.value;document.getElementById('drawerSearch').value=searchQuery;searchClear.classList.toggle('visible',searchQuery.length>0);renderList(currentHeure,searchQuery);if(searchQuery.length>0)openDrawer();});
searchClear.addEventListener('click',()=>{searchInput.value='';searchQuery='';document.getElementById('drawerSearch').value='';searchClear.classList.remove('visible');renderList(currentHeure,'');});
document.getElementById('drawerSearch').addEventListener('input',e=>{searchQuery=e.target.value;searchInput.value=searchQuery;searchClear.classList.toggle('visible',searchQuery.length>0);renderList(currentHeure,searchQuery);});

// ══ SLIDER ══
const slider=document.getElementById('timeSlider');
slider.addEventListener('input',e=>{
  const val=parseFloat(e.target.value),h=Math.floor(val),m=Math.round((val-h)*60);
  document.getElementById('heureAffichee').textContent=h+'h'+(m<10?'0'+m:m);
  slider.style.setProperty('--pct',((val-8)/13)*100+'%');
  currentDate=new Date(); currentDate.setHours(h-2,m,0,0);
  viewer.clock.currentTime=Cesium.JulianDate.fromDate(currentDate); currentHeure=val;
});
slider.addEventListener('change',()=>{ if(terrasses.length>0) scheduleShadow(); });

// ══ CLICK ══
const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
handler.setInputAction(click=>{
  const picked=viewer.scene.pick(click.position);
  if(Cesium.defined(picked)&&picked.id){const id=picked.id.properties?.id?.getValue();const t=terrasses.find(x=>String(x.id)===String(id));if(t){showTooltip(t,click.position.x,click.position.y);return;}}
  hideTooltip();
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ══ BOOT ══
async function loadTerrasses(){
  document.getElementById('loadingState').style.display='flex';
  document.getElementById('terrasseList').style.display='none';
  try{
    const data=await fetchTerrasses();
    document.getElementById('loadingState').style.display='none';
    document.getElementById('terrasseList').style.display='block';
    terrasses=data; terrasses.forEach(t=>{sunStates[t.id]=true;});
    document.getElementById('footerText').textContent=`${terrasses.length} terrasses · ${currentCity.nom}`;
    renderList(currentHeure,'');
    const launch=()=>{ viewer.scene.postRender.addEventListener(function once(){ viewer.scene.postRender.removeEventListener(once); runShadow(); }); };
    if(splashDone) launch(); else { const w=setInterval(()=>{ if(splashDone){ clearInterval(w); launch(); } },100); }
  }catch(e){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('terrasseList').style.display='block';
    document.getElementById('terrasseList').innerHTML=`<div class="no-results">Impossible de charger les terrasses.<br><button onclick="loadTerrasses()" style="margin-top:8px;background:#FFD600;border:none;padding:10px 20px;border-radius:12px;font-weight:600;cursor:pointer;font-size:14px;">🔄 Réessayer</button></div>`;
  }
}

async function init(){
  const now=new Date(); const initH=Math.min(21,Math.max(8,now.getHours()+(Math.round(now.getMinutes()/15)*15/60)));
  slider.value=initH; slider.dispatchEvent(new Event('input')); loadTerrasses();
}
init();
</script>
